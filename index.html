<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cloud Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:420px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);

}

h1{

text-align:center;
margin-bottom:10px;

}

p{

text-align:center;
margin-bottom:20px;
color:#666;

}

input,
textarea{

width:100%;
padding:12px;
margin-top:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;

}

input:focus,
textarea:focus{

outline:none;
border-color:#0077ff;

}

button{

width:100%;
padding:14px;
margin-top:20px;
background:#0077ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0056d6;

}

</style>

</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<p>Fill the form below</p>

<form action="submit.php" method="POST">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<textarea
name="message"
rows="5"
placeholder="Your Message"
required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>

</html>
